name: Build QMK Firmware

on:
  push:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List Keyboard
        run: |
          qmk list-keyboards | grep lilt