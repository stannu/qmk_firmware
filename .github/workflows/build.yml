name: Build QMK Firmware

on:
  push:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli
    
    steps:
      - name: Checkout custom keyboard
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout QMK official repository
        uses: actions/checkout@v4
        with:
          repository: qmk/qmk_firmware
          submodules: recursive
          path: qmk_firmware

      - name: Copy custom keyboard to QMK directory
        run: |
          # 確実にフォルダが存在することを確認しながら、ワイルドカードで全探索してコピーします
          mkdir -p qmk_firmware/keyboards/lilt5r_mk2
          cp -R main-repo/**/lilt5r_mk2/* qmk_firmware/keyboards/lilt5r_mk2/ 2>/dev/null || cp -R main-repo/lilt5r_mk2/* qmk_firmware/keyboards/lilt5r_mk2/ 2>/dev/null || true
          
          # コピーが本当に成功したか、ログに出力して目視確認できるようにします
          echo "=== コピー後のQMKフォルダ中身確認 ==="
          ls -la qmk_firmware/keyboards/lilt5r_mk2/

      - name: Compile Firmware
        run: |
          git config --global --add safe.directory '*'
          cd qmk_firmware
          qmk compile -kb lilt5r_mk2 -km default

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lilt5r_mk2_firmware
          path: |
            qmk_firmware/*.hex
            qmk_firmware/*.uf2
            qmk_firmware/.build/*.hex
            qmk_firmware/.build/*.uf2