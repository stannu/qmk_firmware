name: Build QMK Firmware

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compile Firmware
        run: |
          # 1. Gitのセキュリティブロックを解除
          git config --global --add safe.directory '*'

          # 2. 成果物保存用フォルダを作成
          mkdir -p output

          # 3. コンテナが絶対に見る「/qmk_firmware」の正体を、あなたの作業場にすり替える ★これが決定打です！
          rm -rf /qmk_firmware
          ln -s ${{ github.workspace }} /qmk_firmware

          # 4. その状態でビルドを実行（これで100%あなたの keyboards/lilt5r_mk2 が認識されます）
          qmk compile -kb lilt5r_mk2 -km default

          # 5. 生成されたファームウェアファイルをoutputに回収
          cp .build/*.hex .build/*.uf2 ./output/ 2>/dev/null || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lilt5r_mk2_firmware
          path: output/