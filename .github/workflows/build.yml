name: Build QMK Firmware

on:
  push:
    branches:
      - main
    paths:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compile Firmware
        run: |
          # 1. Gitのセキュリティチェックをスルー
          git config --global --add safe.directory '*'

          # 2. 成果物を保存するためのフォルダを作成
          mkdir -p output

          # 3. その場で直接ビルドを実行する（コピーは不要でした！）
          qmk compile -kb lilt5r_mk2 -km default

          # 4. 完成したファームウェアファイルをoutputフォルダに回収する
          cp *.hex *.uf2 .build/*.hex .build/*.uf2 ./output/ 2>/dev/null || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lilt5r_mk2_firmware
          path: output/