name: Build QMK Firmware

on:
  push:
    branches:
      - main
    paths:
      - '**'
  pull_request:
  workflow_dispatch: # GitHub上で手動実行したい場合

jobs:
  build:
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

    - name: Compile Firmware
      run: |
        # ① 安全性のチェック（dubious ownership）をスルーする設定を追加 ★これを追加！
        git config --global --add safe.directory '*'

        # ② あなたのキーボードフォルダを、QMKの正しいキーボード置き場にコピーする
        cp -R keyboards/lilt5r_mk2 /__w/qmk_firmware/qmk_firmware/keyboards/
        
        # ③ QMKの標準環境の場所（ログから判明したパス）へ移動してビルドを実行する
        cd /__w/qmk_firmware/qmk_firmware
        qmk compile -kb lilt5r_mk2 -km default
          
          mkdir -p output
          cp *.hex output/ || cp *.uf2 output/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lilt5r_mk2_firmware
          path: output/