name: Build QMK Firmware

on:
  push:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compile Firmware
        run: |
          # 1. Gitのセキュリティブロックを解除
          git config --global --add safe.directory '*'

          # 2. 成果物保存用フォルダを作成
          mkdir -p output

          # 3. あなたのキーボードフォルダをコンテナの純正フォルダへ強制コピー
          cp -R keyboards/lilt5r_mk2 /qmk_firmware/keyboards/

          # 4. コンテナの標準QMKディレクトリへ移動
          cd /qmk_firmware

          # 5. ビルドを実行
          qmk compile -kb lilt5r_mk2 -km default

          # 6. 生成されたファイルを元の場所のoutputフォルダに回収
          cp .build/*.hex .build/*.uf2 ${{ github.workspace }}/output/ 2>/dev/null || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lilt5r_mk2_firmware
          path: output/