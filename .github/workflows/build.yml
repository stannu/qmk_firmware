name: Build QMK Firmware

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: qmkfm/qmk_cli

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup QMK
        run: |
          qmk setup -y

      - name: Install Keyboard Definition
        run: |
          cp -r keyboards/lilt5r_mk2 ~/qmk_firmware/keyboards/

      - name: Compile Firmware
        run: |
          cd ~/qmk_firmware
          qmk compile -kb lilt5r_mk2 -km default

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: lilt5r_mk2_firmware
          path: |
            ~/qmk_firmware/*.uf2
            ~/qmk_firmware/.build/*.uf2
            ~/qmk_firmware/*.bin
            ~/qmk_firmware/.build/*.bin