name: Build QMK Firmware

on:
  push:
    branches:
      - master  # ★ここを main から master に修正しました！
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compile Firmware
        run: |
          # 1. Gitのセキュリティブロックを解除
          git config --global --add safe.directory '*'

          # 2. 成果物保存用フォルダを作成
          mkdir -p output

          # 3. あなたの作業場所をQMKのホームグラウンドとして強制認識させる
          export QMK_HOME=${{ github.workspace }}

          # 4. ビルドを実行（これで完璧にお手元のフォルダ構造と一致します）
          qmk compile -kb lilt5r_mk2 -km default

          # 5. 生成されたファームウェアファイルを回収
          cp .build/*.hex .build/*.uf2 ./output/ 2>/dev/null || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lilt5r_mk2_firmware
          path: output/