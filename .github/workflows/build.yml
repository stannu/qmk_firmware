name: Build QMK Firmware

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest
container: qmkfm/qmk_cli


steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Check Keyboard Files
    run: |
      ls -la keyboards/lilt5r_mk2

  - name: List Keyboard
    run: |
      qmk list-keyboards | grep lilt

  - name: Compile Firmware
    run: |
      qmk compile -kb lilt5r_mk2 -km default