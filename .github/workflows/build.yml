name: Build QMK Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Current Folder
        run: |
          pwd
          ls
          ls keyboards

      - name: Check Keyboard Folder
        run: |
          ls -la keyboards/lilt5r_mk2