name: Build QMK Firmware

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compile Firmware
        run: |
          # 1. Gitのセキュリティブロックを解除
          git config --global --add safe.directory '*'

          # 2. 成果物保存用フォルダを作成
          mkdir -p output

          # 3. ★ここをご自身の「親フォルダ名/lilt5r_mk2」に書き換えてください！
          qmk compile -kb 親フォルダ名/lilt5r_mk2 -km default

          # 4. 生成されたファームウェアファイルをoutputに回収
          cp .build/*.hex .build/*.uf2 ./output/ 2>/dev/null || cp *.hex *.uf2 ./output/ 2>/dev/null || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lilt5r_mk2_firmware
          path: output/