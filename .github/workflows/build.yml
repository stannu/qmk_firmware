name: Build QMK Firmware

on:
  push:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli

    steps:
    - uses: actions/checkout@v4

    - name: Debug
      run: |
        pwd
        whoami
        ls -la /
        find / -maxdepth 3 -type d -name keyboards 2>/dev/null
